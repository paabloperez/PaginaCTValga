version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ctvalga_db
    environment:
      POSTGRES_USER: user_valga
      POSTGRES_PASSWORD: password_valga
      POSTGRES_DB: clubtenis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatiza la creación de tablas al arrancar por primera vez
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend-api
    container_name: ctvalga_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user_valga:password_valga@db:5432/clubtenis_db
      DB_HOST: db
      DB_NAME: clubtenis_db
      DB_USER: user_valga
      DB_PASSWORD: password_valga
    volumes:
      # Mapea toda la carpeta scripts. 
      # Dentro de Docker, verás todo en la ruta /app/scripts/
      - ./scripts:/app/scripts
    depends_on:
      - db

  frontend-server:
    build: ./node-server
    container_name: ctvalga_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./node-server:/app
    depends_on:
      - backend

volumes:
  postgres_data: