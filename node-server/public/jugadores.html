<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎾 Club de Tenis Valga - Plantilla de Jugadores</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="cabecera-jugadores">
        <a href="index.html" class="back-link">← Volver al Inicio</a>
        <img src="assets/logoCTValga.jpeg" alt="Logo del Club de Tenis Valga" class="club-logo">
        <h1>Club de Tenis Valga</h1>
        <p>Conoce a los jugadores que forman parte de nuestro club.</p>
    </header>

    <main class="contenido-principal">
        <section id="plantilla-jugadores">
            <h2>Nuestra Plantilla de Jugadores</h2>
            <div class="jugadores-grid">
                <div class="jugador">
                    <h3>1. Manuel Ramallo</h3>
                    <img src="assets/J_DanielPerez.jpeg" alt="Jugador 1">
                </div>
                <div class="jugador">
                    <h3>2. Daniel Pérez</h3>
                    <img src="assets/J_DanielPerez.jpeg" alt="Jugador 2">
                </div>
                <div class="jugador">
                    <h3>3. Pablo Pérez</h3>
                    <img src="assets/J_DanielPerez.jpeg" alt="Jugador 3">
                </div>
                <div class="jugador">
                    <h3>4. Marcos Saborido</h3>
                    <img src="assets/J_DanielPerez.jpeg" alt="Jugador 4">
                </div>
                <div class="jugador">
                    <h3>5. Borja Arguibay</h3>
                    <img src="assets/J_DanielPerez.jpeg" alt="Jugador 5">
                </div>

                <!-- Más jugadores pueden ser añadidos aquí -->
            </div>
        </section>
    </main>

    <footer class="pie-de-pagina">
        <p>&copy; 2024 Club de Tenis Valga. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
