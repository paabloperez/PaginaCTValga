<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎾 Club de Tenis Valga - Ranking</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="admin-bar" class="admin-bar">
        <span id="welcome-msg">Invitado</span>
        <button id="auth-btn" class="auth-btn">Login</button>
    </div>

    <header class="cabecera-jugadores">
        <a href="index.html" class="back-link">← Volver al Inicio</a>
        <img src="assets/logoCTValga.jpeg" alt="Logo del Club de Tenis Valga" class="club-logo">
        <h1>Club de Tenis Valga</h1>
        <p>Consulta el ranking de nuestro club y el autonómico.</p>
    </header>

    <main class="contenido-principal">
        <section id="ranking-jugadores">
            <h2>Clasificación por puntos:</h2>

            <div id="ranking-api-container">
                <p>Cargando ranking...</p>
            </div>
        </section>
    </main>

    <footer class="pie-de-pagina">
        <p>&copy; 2024 Club de Tenis Valga. Todos los derechos reservados.</p>
    </footer>

    <script>
        // --- 1. LÓGICA DE AUTENTICACIÓN (NUEVA) ---
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('adminToken');
            const welcomeMsg = document.getElementById('welcome-msg');
            const authBtn = document.getElementById('auth-btn');

            if (token) {
                try {
                    // Decodificamos el nombre del admin desde el Token JWT (Base64)
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    welcomeMsg.innerHTML = `👋 Hola, <strong>${payload.sub}</strong>`;
                    
                    authBtn.textContent = 'Cerrar Sesión';
                    authBtn.classList.add('logout');
                    authBtn.onclick = () => {
                        localStorage.removeItem('adminToken');
                        window.location.reload();
                    };
                } catch (e) {
                    console.error("Token corrupto o inválido");
                    localStorage.removeItem('adminToken');
                }
            } else {
                authBtn.onclick = () => { window.location.href = 'login.html'; };
            }
        });

        // --- 2. TU LÓGICA DE RANKING (AJUSTADA) ---
        async function cargarRanking() {
            const contenedor = document.getElementById('ranking-api-container');
            if (!contenedor) return;

            try {
                const response = await fetch('/api/ranking-club');
                const jugadores = await response.json();

                let tablaHTML = `
                    <table class="tabla-ranking">
                        <thead>
                            <tr>
                                <th>Puesto Club</th>
                                <th>Nombre</th>
                                <th>Puntos</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                jugadores.forEach(jugador => {
                    tablaHTML += `
                        <tr>
                            <td>${jugador.posicion_club || '-'}</td>
                            <td>${jugador.nombre_completo}</td>
                            <td>${jugador.puntos}</td>
                        </tr>
                    `;
                });

                tablaHTML += `</tbody></table>`;
                contenedor.innerHTML = tablaHTML;

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = "<p>⚠️ Error al cargar el ranking. Asegúrate de que el servidor Node está encendido.</p>";
            }
        }

        cargarRanking();
    </script>
